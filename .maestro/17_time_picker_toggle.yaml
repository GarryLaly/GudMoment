appId: com.anonymous.gudmoment
---
# Test: Time picker toggle on create form
- runFlow: setup.yaml

# Open create screen
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Time Toggle"
- hideKeyboard

# Should see "Include time?" with toggle switch
- scrollUntilVisible:
    element: "Include time?"
    direction: DOWN
- assertVisible: "Include time?"

# Save without time — should work
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"
- scrollUntilVisible:
    element: "E2E Time Toggle"
    direction: DOWN
- assertVisible: "E2E Time Toggle"
