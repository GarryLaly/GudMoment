appId: com.anonymous.gudmoment
---
# Test: Settings screen shows all sections
- runFlow: setup.yaml

# Navigate to settings tab (tap the gear emoji in tab bar)
- tapOn: "⚙️"

# Verify all sections are visible
- assertVisible: "Settings"
- assertVisible: "Data"
- assertVisible: "Export All Moments"
- assertVisible: "Import Moments"
- assertVisible: "About"
- assertVisible: "GudMoment"
