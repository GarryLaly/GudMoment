appId: com.anonymous.gudmoment
---
# Test: Settings screen shows all sections
- runFlow: setup.yaml

# Navigate to settings tab
- tapOn: "Settings tab"

# Verify Data section visible
- assertVisible: "Settings"
- assertVisible: "Data"
- assertVisible: "Export All Moments"
- assertVisible: "Import Moments"

# Scroll to see About section
- scrollUntilVisible:
    element: "About"
    direction: DOWN
- assertVisible: "About"
