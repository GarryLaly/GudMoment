appId: com.anonymous.gudmoment
---
# Test: Notification picker on detail screen
- runFlow: setup.yaml

# Create a moment
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Notify Test"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Open detail
- scrollUntilVisible:
    element: "E2E Notify Test"
    direction: DOWN
- tapOn: "E2E Notify Test"

# Should see notification picker
- scrollUntilVisible:
    element: "Remind me"
    direction: DOWN

- assertVisible: "Every Year"
- assertVisible: "Every 2 Years"
- assertVisible: "Every 6 Months"
- assertVisible: "Monthly"

# Select yearly notification
- tapOn: "Every Year"
