appId: com.anonymous.gudmoment
---
# Test: View moment detail screen with actions
- runFlow: setup.yaml

# Create a moment first
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Detail Test"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Tap the moment to see detail
- scrollUntilVisible:
    element: "E2E Detail Test"
    direction: DOWN
- tapOn: "E2E Detail Test"

# Verify detail screen elements
- assertVisible: "E2E Detail Test"
- assertVisible: "Share via QR"
- assertVisible: "Edit"
- assertVisible: "Delete"

# Go back
- tapOn: "← Back"
