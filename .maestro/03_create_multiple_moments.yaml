appId: com.anonymous.gudmoment
---
# Test: Create multiple moments and verify they appear in list
- runFlow: setup.yaml

# Create first moment
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Multi A"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"
- scrollUntilVisible:
    element: "E2E Multi A"
    direction: DOWN
- assertVisible: "E2E Multi A"

# Create second moment
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Multi B"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"
- scrollUntilVisible:
    element: "E2E Multi B"
    direction: DOWN
- assertVisible: "E2E Multi B"
- scrollUntilVisible:
    element: "E2E Multi A"
    direction: DOWN
- assertVisible: "E2E Multi A"
