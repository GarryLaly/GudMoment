appId: com.anonymous.gudmoment
---
# Test: Create multiple moments and verify they appear in list
- runFlow: setup.yaml

# Create first moment
- tapOn: "+"
- tapOn:
    id: "title-input"
    optional: true
- inputText: "Wedding Day"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"
- assertVisible: "Wedding Day"

# Create second moment
- tapOn: "+"
- inputText: "First Date"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"
- assertVisible: "First Date"
- assertVisible: "Wedding Day"

# Create third moment
- tapOn: "+"
- inputText: "Baby Born"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"
- assertVisible: "Baby Born"
- assertVisible: "First Date"
- assertVisible: "Wedding Day"
