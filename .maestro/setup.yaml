appId: com.anonymous.gudmoment
---
# Shared setup: Launch app and ensure we're on home screen
- launchApp

# Wait for app to load (either home screen or any screen)
- extendedWaitUntil:
    visible:
      text: "+"
    timeout: 45000

# Ensure we're on the Moments tab (home screen)
- tapOn:
    text: "Moments"
    optional: true
