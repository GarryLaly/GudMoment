appId: com.anonymous.gudmoment
---
# Test: Widget configuration in settings
- runFlow: setup.yaml

# Create a moment so widget config has options
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Widget Test"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Go to Settings
- tapOn: "Settings"

# Scroll to Widget Configuration
- scrollUntilVisible:
    element: "Widget Configuration"
    direction: DOWN

- assertVisible: "Multi-Moment List Widget"
- assertVisible: "Random Rotation Widget"

# Scroll to save button
- scrollUntilVisible:
    element: "Save Widget Config"
    direction: DOWN
- assertVisible: "Save Widget Config"
