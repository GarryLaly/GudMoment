appId: com.anonymous.gudmoment
---
# Test: Emoji and color pickers work on create screen
- runFlow: setup.yaml

# Open create screen
- tapOn: "+"

# Enter title
- tapOn: "What's the moment?"
- inputText: "E2E Emoji Test"
- hideKeyboard

# Scroll to see emoji picker
- scrollUntilVisible:
    element: "Pick an emoji"
    direction: DOWN

# Tap a different emoji (ring)
- tapOn: "💍"

# Scroll to color picker
- scrollUntilVisible:
    element: "Pick a color"
    direction: DOWN

# Save
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Verify moment created
- scrollUntilVisible:
    element: "E2E Emoji Test"
    direction: DOWN
- assertVisible: "E2E Emoji Test"
