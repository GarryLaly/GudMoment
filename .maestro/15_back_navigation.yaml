appId: com.anonymous.gudmoment
---
# Test: Back navigation works correctly from all screens
- runFlow: setup.yaml

# Create a moment for navigation testing
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Nav Test"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Test: Create screen back button
- tapOn: "+"
- assertVisible: "New Moment"
- tapOn: "← Back"
- assertVisible: "GudMoment"

# Test: Detail screen back button
- scrollUntilVisible:
    element: "E2E Nav Test"
    direction: DOWN
- tapOn: "E2E Nav Test"
- assertVisible: "E2E Nav Test"
- tapOn: "← Back"
- assertVisible: "GudMoment"

# Test: Edit screen back button
- scrollUntilVisible:
    element: "E2E Nav Test"
    direction: DOWN
- tapOn: "E2E Nav Test"
- tapOn: "Edit"
- assertVisible: "Edit Moment"
- tapOn: "← Back"
- assertVisible: "E2E Nav Test"

# Test: QR screen back button
- tapOn: "Share via QR"
- assertVisible: "Done"
- tapOn: "Done"
- assertVisible: "E2E Nav Test"
