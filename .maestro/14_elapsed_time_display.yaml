appId: com.anonymous.gudmoment
---
# Test: Elapsed time displays on both list and detail views
- runFlow: setup.yaml

# Create a moment
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Time Test"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# On the home screen, the moment should be visible
- scrollUntilVisible:
    element: "E2E Time Test"
    direction: DOWN
- assertVisible: "E2E Time Test"

# Open detail to verify detail screen loads
- tapOn: "E2E Time Test"

# The detail screen should show the moment title and action buttons
- assertVisible: "E2E Time Test"
- assertVisible: "Share via QR"
- assertVisible: "Edit"
- assertVisible: "Delete"
