appId: com.anonymous.gudmoment
---
# Test: Tab navigation between Moments and Settings
- runFlow: setup.yaml

# Should start on Moments tab
- assertVisible: "GudMoment"

# Switch to Settings tab
- tapOn: "Settings tab"
- assertVisible: "Data"
- assertVisible: "Export All Moments"

# Switch back to Moments tab
- tapOn: "Moments tab"
- assertVisible: "GudMoment"
