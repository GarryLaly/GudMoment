appId: com.anonymous.gudmoment
---
# Test: Tab navigation between Moments and Settings
- runFlow: setup.yaml

# Should start on Moments tab
- assertVisible: "GudMoment"

# Switch to Settings tab (tap gear emoji)
- tapOn: "⚙️"
- assertVisible: "Data"
- assertVisible: "About"

# Switch back to Moments tab (tap heart emoji)
- tapOn: "💝"
- assertVisible: "GudMoment"
