appId: com.anonymous.gudmoment
---
# Test: Delete a moment with confirmation dialog
- runFlow: setup.yaml

# Create a moment
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Delete Me"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"
- scrollUntilVisible:
    element: "E2E Delete Me"
    direction: DOWN
- assertVisible: "E2E Delete Me"

# Open detail
- tapOn: "E2E Delete Me"

# Tap delete
- tapOn: "Delete"

# Confirmation dialog should appear
- assertVisible: "Delete E2E Delete Me?"
- assertVisible: "This cannot be undone."

# Cancel first — moment should still be there
- tapOn: "Cancel"
- assertVisible: "E2E Delete Me"

# Now actually delete
- tapOn: "Delete"
- assertVisible: "Delete E2E Delete Me?"
- tapOn:
    text: "Delete"
    index: 1

# Should be back on home — do NOT assert "No moments yet!" as other moments may exist
- assertVisible: "GudMoment"
