appId: com.anonymous.gudmoment
---
# Test: Generate QR code for sharing a moment
- runFlow: setup.yaml

# Create a moment
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E QR Test"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Open detail
- scrollUntilVisible:
    element: "E2E QR Test"
    direction: DOWN
- tapOn: "E2E QR Test"

# Tap Share via QR
- tapOn: "Share via QR"

# QR screen should show moment info
- assertVisible: "E2E QR Test"
- assertVisible: "Ask your partner to scan this in GudMoment"
- assertVisible: "Done"

# Go back
- tapOn: "Done"
- assertVisible: "E2E QR Test"
