appId: com.anonymous.gudmoment
---
# Test: Moment with very long title (edge case - max 100 chars)
- runFlow: setup.yaml

# Open create
- tapOn: "+"

# Type a very long title (TextInput has maxLength=100)
- tapOn: "What's the moment?"
- inputText: "This Is A Really Long Moment Title That Tests The Maximum Character Limit Of One Hundred Characters!!"
- hideKeyboard

# Save
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Should see the home screen (moment may be truncated in list)
- assertVisible: "GudMoment"
