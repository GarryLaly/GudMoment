appId: com.anonymous.gudmoment
---
# Test: Create a new moment with all fields
- runFlow: setup.yaml

# Tap the FAB (+) button to create
- tapOn: "+"

# Should see the create moment screen
- assertVisible: "New Moment"
- assertVisible: "What's the moment?"

# Enter title
- tapOn: "What's the moment?"
- inputText: "E2E Create Test"
- hideKeyboard

# Tap save button
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Should navigate back to home and see the moment
- assertVisible: "GudMoment"
- scrollUntilVisible:
    element: "E2E Create Test"
    direction: DOWN
- assertVisible: "E2E Create Test"
