appId: com.anonymous.gudmoment
---
# Test: Edit an existing moment's title
- runFlow: setup.yaml

# Create a moment
- tapOn: "+"
- inputText: "Old Title"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Open detail
- tapOn: "Old Title"

# Tap edit
- tapOn: "Edit"

# Should see edit screen
- assertVisible: "Edit Moment"

# Clear and change title
- tapOn: "Old Title"
- clearText
- inputText: "New Title"
- hideKeyboard

# Save
- scrollUntilVisible:
    element: "Save Changes"
    direction: DOWN
- tapOn: "Save Changes"

# Back on detail, should see new title
- assertVisible: "New Title"
