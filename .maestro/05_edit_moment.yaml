appId: com.anonymous.gudmoment
---
# Test: Edit an existing moment's title
- runFlow: setup.yaml

# Create a moment
- tapOn: "+"
- tapOn: "What's the moment?"
- inputText: "E2E Edit Before"
- hideKeyboard
- scrollUntilVisible:
    element: "Save Moment"
    direction: DOWN
- tapOn: "Save Moment"

# Open detail
- scrollUntilVisible:
    element: "E2E Edit Before"
    direction: DOWN
- tapOn: "E2E Edit Before"

# Tap edit
- tapOn: "Edit"

# Should see edit screen
- assertVisible: "Edit Moment"

# Clear and change title
- tapOn: "E2E Edit Before"
- clearText
- inputText: "E2E Edit After"
- hideKeyboard

# Save
- scrollUntilVisible:
    element: "Save Changes"
    direction: DOWN
- tapOn: "Save Changes"

# Back on detail, should see new title
- assertVisible: "E2E Edit After"
